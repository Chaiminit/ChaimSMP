services:
  minecraft:
    build: .
    container_name: chaimsmp
    ports:
      - "25565:25565"
    volumes:
      - ./data:/minecraft
    environment:
      - JVM_OPTS=-Xms2G -Xmx8G -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=16M -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:+UseStringDeduplication -XX:+OptimizeStringConcat -XX:+UseCompressedOops
    stdin_open: true
    tty: true
    restart: unless-stopped
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
